services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 8090:8090
    volumes:
      - ./_data_beszel:/beszel_data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./_data_portainer:/data
    ports:
      - "9443:9443"
      - "9000:9000"
      - "8000:8000"
    restart: unless-stopped
  portainer_agent:
    image: portainer/agent:latest
    container_name: portainer_agent
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host

  statping:
    image: dockurr/statping:latest
    container_name: statping
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./_data_statping:/app
    ports:
      - "8888:8080"
    restart: unless-stopped

  diun:
    container_name: diun
    image: crazymax/diun:latest
    command: serve
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./_data_diun:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
    labels:
      - "diun.enable=true"
    restart: unless-stopped

  healthchecks:
    image: healthchecks/healthchecks:latest
    container_name: healthchecks
    environment:
      - DB=sqlite
      - DB_NAME=/data/hc.sqlite
      - DEBUG=False
      - DEFAULT_FROM_EMAIL=fixme-email-address-here
      - EMAIL_HOST=fixme-smtp-host-here
      - EMAIL_HOST_PASSWORD=fixme-smtp-password-here
      - EMAIL_HOST_USER=fixme-smtp-username-here
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - SECRET_KEY=---
      - SITE_ROOT=http://localhost:8000
    ports:
      - 8000:8000
    volumes:
      - ./_data_healthchecks:/data
    restart: unless-stopped

  casa:
    image: dockurr/casa
    container_name: casa
    ports:
      - 8088:8080
    volumes:
      - ./_data_casa:/DATA
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: always
    stop_grace_period: 1m
  monitoring-agent:
    image: operacle/checkcle-server-agent:latest
    container_name: checkcle-agent
    restart: unless-stopped
    ports:
      - "8081:8081"
    group_add:
      - 999
    environment:
      # FIX ENV
      AGENT_ID: "agent_80l16dqtyghe14dr48t4m5"
      SERVER_NAME: "nano"
      SERVER_TOKEN: "srv_54kkelyffxyfhlf2fkv8p5"
      POCKETBASE_URL: "http://10.0.1.56:8099"
      POCKETBASE_ENABLED: "true"
    volumes:
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run:/host/var/run:ro
      - /dev:/host/dev:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./checkcle_data:/var/lib/monitoring-agent
      - ./checkcle_logs:/var/log/monitoring-agent
